version: '3.8'

services:
  # Main Application Container (Laravel Backend + Vite Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapiles_dtr_app
    restart: no
    ports:
      - "8000:80"  # Exposes Laravel server
      - "5173:5173"  # Exposes Vite Hot-Reloading server
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=mapiles_dtr
      - DB_USERNAME=dtr_user
      - DB_PASSWORD=dtr_secure_pass
    depends_on:
      - db

  # Database Container
  db:
    image: postgres:16
    container_name: mapiles_dtr_db
    restart: always
    environment:
      POSTGRES_DB: mapiles_dtr
      POSTGRES_USER: dtr_user
      POSTGRES_PASSWORD: dtr_secure_pass
    ports:
      - "5432:5432"  # Exposes database port
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: