services:
  # =========================================================================
  # 1. LOCAL DEVELOPMENT ENVIRONMENT (Your Safe Sandbox)
  # =========================================================================
  app-local:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: mapiles_dtr_app_local
    restart: no
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      - DB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =========================================================================
  # 2. ORIGINAL DEPLOYMENT/PRODUCTION-LIKE SIMULATION
  # =========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapiles_dtr_app
    restart: no
    ports:
      - "8080:80"
      - "5174:5173"
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=mapiles_dtr
      - DB_USERNAME=dtr_user
      - DB_PASSWORD=dtr_secure_pass
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: mapiles_dtr_db
    restart: always
    environment:
      POSTGRES_DB: mapiles_v1
      POSTGRES_USER: dtr_user
      POSTGRES_PASSWORD: dtr_secure_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
